  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#converterBg)" />

  <circle cx="32" cy="32" r="18" fill="none" stroke="#e8f4ff" stroke-width="4" stroke-linecap="round" opacity="0.36" />
  <path d="M24.22 24.22 A11 11 0 0 1 39.78 24.22" fill="none" stroke="#e8f4ff" stroke-width="4" stroke-linecap="round" marker-end="url(#converterArrowHeadLight)" />
  <path d="M39.78 39.78 A11 11 0 0 1 24.22 39.78" fill="none" stroke="#9dd8ff" stroke-width="4" stroke-linecap="round" marker-end="url(#converterArrowHeadAccent)" />
