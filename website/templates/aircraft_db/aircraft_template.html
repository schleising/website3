{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="/css/aircraft_db/aircraft_db.css?v1.1.7">
{% block scripts %}
<script defer src="/js/aircraft_db/aircraft_db.js?v1.1.2"></script>
{% endblock %}
{% block title %}<title>Aircraft DB</title>{% endblock %}
{% endblock %}

{% block header %}
<h3 class="header-text">Search the OpenSky Database</h3>
{% endblock %}

{% block content %}
<div id="aircraft_db_container">
  <div id="aircraft_controls">
    <label for="input_tail_number" class="form_label">Enter Tail Number</label>
    <div class="search-controls">
      <input class="form_control" id="input_tail_number" list="tail-number-datalist">
      <datalist id="tail-number-datalist">
      </datalist>
      <button type="submit" class="btn btn-primary" id="search-button">Search</button>
    </div>
  </div>
  <div id="aircraft_output">
    <p id="aircraft_output_message" aria-live="polite"></p>
    <section id="aircraft_card" aria-label="Aircraft details"></section>
  </div>
</div>
{% endblock %}

{% block footer %}
<footer>Data sourced from <a href="https://opensky-network.org/" class="link-light" target="_blank">OpenSky</a></footer>
{% endblock %}
