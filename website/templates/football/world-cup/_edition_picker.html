{% if show_edition_selector|default(false) %}
<div id="world-cup-edition-backdrop" class="football-season-backdrop hidden" aria-hidden="true"></div>
<section
  id="world-cup-edition-popup"
  class="football-season-popup site-card hidden"
  role="dialog"
  aria-modal="true"
  aria-labelledby="world-cup-edition-popup-title"
>
  <div class="football-season-popup-header">
    <h4 id="world-cup-edition-popup-title">Select Edition</h4>
    <button type="button" id="world-cup-edition-close" class="football-season-close" aria-label="Close edition selector">x</button>
  </div>
  <form class="football-season-popup-form" method="get" action="{{ edition_picker_action|default(edition_switch_path) }}">
    <label class="football-season-label" for="world-cup-edition-select">Edition</label>
    <select id="world-cup-edition-select" name="edition" class="football-season-select site-select">
      {% for edition_option in available_editions %}
      <option value="{{ edition_option.key }}" {% if edition_option.selected %}selected{% endif %}>{{ edition_option.label }}{% if edition_option.is_current %} (Latest){% endif %}</option>
      {% endfor %}
    </select>
    <div class="football-season-popup-actions">
      <button type="submit" class="btn btn-primary football-season-go">Apply</button>
      {% if not is_current_edition|default(false) %}
      <a href="{{ current_edition_url }}" class="btn btn-primary football-season-current-btn" data-history-mode="football-shell">Latest Edition {{ current_edition }}</a>
      {% endif %}
    </div>
  </form>
</section>
{% endif %}
